name: Build Postman Collection

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build collection
        run: npm run build:collection

      - name: Commit generated collection
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add collection.json
          git commit -m "auto: rebuild postman collection" || echo "no changes"
          git push